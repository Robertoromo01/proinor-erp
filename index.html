<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PROINOR ERP CRM</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f4f5f7;--sidebar:#1a1d23;--sidebar-hover:#2a2d35;--accent:#3b82f6;--accent-dark:#2563eb;
  --white:#fff;--border:#e5e7eb;--text:#111827;--muted:#6b7280;--success:#10b981;--warning:#f59e0b;
  --danger:#ef4444;--info:#3b82f6;--radius:8px;--shadow:0 1px 3px rgba(0,0,0,.08);
}
body{font-family:Arial,sans-serif;font-size:14px;color:var(--text);background:var(--bg);display:flex;min-height:100vh;}
#sidebar{width:220px;background:var(--sidebar);display:flex;flex-direction:column;flex-shrink:0;min-height:100vh;}
#sidebar .logo{padding:20px 16px 16px;border-bottom:1px solid #2a2d35;}
#sidebar .logo h2{color:#fff;font-size:15px;font-weight:700;line-height:1.2;}
#sidebar .logo p{color:#9ca3af;font-size:11px;margin-top:2px;}
#sidebar nav{flex:1;padding:12px 0;}
.nav-section{padding:8px 16px 4px;font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:.08em;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;color:#d1d5db;cursor:pointer;font-size:13px;transition:background .15s;}
.nav-item:hover{background:var(--sidebar-hover);color:#fff;}
.nav-item.active{background:var(--accent);color:#fff;}
.nav-item .icon{font-size:16px;width:20px;text-align:center;}
#main{flex:1;display:flex;flex-direction:column;min-width:0;}
#topbar{background:var(--white);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;}
#topbar h1{font-size:18px;font-weight:700;}
.user-chip{display:flex;align-items:center;gap:8px;background:var(--bg);padding:6px 12px;border-radius:20px;font-size:13px;}
#content{flex:1;padding:24px;overflow-y:auto;}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px;}
.stat-card{background:var(--white);border-radius:var(--radius);padding:16px 20px;box-shadow:var(--shadow);border:1px solid var(--border);}
.stat-card .label{font-size:12px;color:var(--muted);margin-bottom:6px;}
.stat-card .value{font-size:24px;font-weight:700;}
.stat-card .sub{font-size:12px;color:var(--muted);margin-top:4px;}
.stat-card .sub-row{display:flex;gap:12px;margin-top:6px;}
.stat-card .sub-item{font-size:12px;}
.panel{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);margin-bottom:20px;}
.panel-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.panel-header h3{font-size:15px;font-weight:700;}
.panel-body{padding:20px;}
.tbl-wrap{overflow-x:auto;}
table.data{width:100%;border-collapse:collapse;font-size:13px;}
table.data th{background:#f9fafb;padding:10px 12px;text-align:left;font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);}
table.data td{padding:10px 12px;border-bottom:1px solid #f3f4f6;vertical-align:middle;}
table.data tr:hover td{background:#fafafa;}
table.data tr:last-child td{border-bottom:none;}
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:2px 10px;border-radius:20px;}
.badge-green{background:#d1fae5;color:#065f46;}
.badge-blue{background:#dbeafe;color:#1e40af;}
.badge-yellow{background:#fef3c7;color:#92400e;}
.badge-red{background:#fee2e2;color:#991b1b;}
.badge-gray{background:#f3f4f6;color:#374151;}
.badge-purple{background:#ede9fe;color:#5b21b6;}
.badge-orange{background:#ffedd5;color:#9a3412;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius);border:none;cursor:pointer;font-size:13px;font-weight:600;transition:all .15s;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:var(--accent-dark);}
.btn-secondary{background:#f3f4f6;color:var(--text);border:1px solid var(--border);}
.btn-secondary:hover{background:#e5e7eb;}
.btn-danger{background:#fee2e2;color:#991b1b;}
.btn-danger:hover{background:#fecaca;}
.btn-sm{padding:5px 10px;font-size:12px;}
.btn-icon{padding:6px;border-radius:6px;background:#f3f4f6;border:1px solid var(--border);cursor:pointer;font-size:14px;}
.btn-icon:hover{background:#e5e7eb;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.form-grid-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:14px;}
.form-group{display:flex;flex-direction:column;gap:4px;}
.form-group label{font-size:12px;color:var(--muted);font-weight:600;}
.form-group input,.form-group select,.form-group textarea{padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;color:var(--text);background:#fff;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:2px solid var(--accent);border-color:transparent;}
.form-group textarea{resize:vertical;min-height:70px;}
.form-section-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin:18px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--white);border-radius:12px;width:90%;max-width:780px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.modal-header{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-header h3{font-size:16px;font-weight:700;}
.modal-body{padding:24px;}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;}
.search-bar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.search-bar input{flex:1;min-width:200px;padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;}
.pipeline{display:grid;gap:12px;}
.pipeline-col{background:#f9fafb;border-radius:var(--radius);padding:12px;}
.pipeline-col h4{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;}
.pipeline-card{background:var(--white);border:1px solid var(--border);border-radius:6px;padding:10px 12px;margin-bottom:8px;cursor:pointer;}
.pipeline-card:hover{border-color:var(--accent);}
.pipeline-card .pname{font-weight:600;font-size:13px;}
.pipeline-card .pco{font-size:12px;color:var(--muted);}
.pipeline-card .pval{font-size:12px;color:var(--accent);margin-top:4px;font-weight:600;}
.ingreso-row td:first-child{border-left:3px solid var(--success);}
.egreso-row td:first-child{border-left:3px solid var(--danger);}
.tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:20px;}
.tab{padding:10px 20px;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.empty{text-align:center;padding:48px 20px;color:var(--muted);}
.empty .icon{font-size:40px;margin-bottom:12px;}
#toast{position:fixed;bottom:24px;right:24px;background:#1a1d23;color:#fff;padding:12px 20px;border-radius:8px;font-size:13px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;}
#toast.show{opacity:1;}
.cot-items-table{width:100%;border-collapse:collapse;margin-bottom:8px;font-size:13px;}
.cot-items-table th{background:#f9fafb;padding:7px 8px;font-size:11px;text-align:left;border-bottom:1px solid var(--border);}
.cot-items-table td{padding:5px 6px;border-bottom:1px solid #f3f4f6;}
.cot-totals{display:flex;justify-content:flex-end;}
.cot-tbox{width:260px;}
.cot-trow{display:flex;justify-content:space-between;padding:4px 0;font-size:13px;border-bottom:1px solid #f3f4f6;}
.cot-trow.grand{font-weight:700;font-size:15px;border:none;border-top:2px solid #222;margin-top:4px;padding-top:8px;}
.cot-letra{font-size:11px;font-style:italic;color:var(--muted);margin-top:6px;padding:5px 8px;background:#f8f8f8;border-left:3px solid #ccc;border-radius:3px;}
.check-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 14px;margin-top:6px;}
.check-item{display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;}
.check-item input[type=checkbox]{width:auto;}
.file-upload-area{border:2px dashed var(--border);border-radius:var(--radius);padding:20px;text-align:center;cursor:pointer;transition:border-color .2s;}
.file-upload-area:hover{border-color:var(--accent);}
.file-upload-area.has-file{border-color:var(--success);background:#f0fdf4;}
.file-info{display:flex;align-items:center;gap:8px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:6px;padding:8px 12px;font-size:13px;margin-top:8px;}
@media(max-width:768px){
  #sidebar{width:60px;}
  .nav-item span,.nav-section,.logo p,.logo h2{display:none;}
  .nav-item{justify-content:center;}
}
</style>
</head>
<body>

<div id="sidebar">
  <div class="logo">
    <h2>PROINOR</h2>
    <p>ERP · CRM</p>
  </div>
  <nav>
    <div class="nav-section">Principal</div>
    <div class="nav-item active" onclick="showPage('dashboard')"><span class="icon">📊</span><span>Dashboard</span></div>
    <div class="nav-section">Ventas</div>
    <div class="nav-item" onclick="showPage('clientes')"><span class="icon">👥</span><span>Clientes</span></div>
    <div class="nav-item" onclick="showPage('prospectos')"><span class="icon">🎯</span><span>Prospectos</span></div>
    <div class="nav-item" onclick="showPage('cotizaciones')"><span class="icon">📄</span><span>Cotizaciones</span></div>
    <div class="nav-item" onclick="showPage('ordenes')"><span class="icon">📦</span><span>Órdenes</span></div>
    <div class="nav-section">Finanzas</div>
    <div class="nav-item" onclick="showPage('contabilidad')"><span class="icon">💰</span><span>Contabilidad</span></div>
    <div class="nav-section">Config</div>
    <div class="nav-item" onclick="showPage('vendedores')"><span class="icon">👤</span><span>Vendedores</span></div>
    <div class="nav-item" onclick="showPage('configuracion')"><span class="icon">⚙️</span><span>Configuración</span></div>
  </nav>
</div>

<div id="main">
  <div id="topbar">
    <h1 id="page-title">Dashboard</h1>
    <div class="topbar-right">
      <div class="user-chip">👤 <span id="user-name">PROINOR</span></div>
    </div>
  </div>
  <div id="content"></div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title"></h3>
      <button class="btn-icon" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<div id="toast"></div>

<script>
const SUPA_URL='https://myvoeelcbnmhijrxevju.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im15dm9lZWxjYm5taGlqcnhldmp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0MDQ4OTQsImV4cCI6MjA5Nzk4MDg5NH0.gDA9tc7LQ5bfhdZAWXG-B4wGWfDewMvW7YPlTMdNZcI';
const sb=supabase.createClient(SUPA_URL,SUPA_KEY);

function fmt(n){return '$'+(parseFloat(n)||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');}
function fmtDate(d){if(!d)return '—';return new Date(d+'T12:00:00').toLocaleDateString('es-MX',{day:'2-digit',month:'short',year:'numeric'});}
function toast(msg,ok=true){const t=document.getElementById('toast');t.textContent=msg;t.style.background=ok?'#065f46':'#991b1b';t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
function closeModal(){document.getElementById('modal').classList.remove('open');}
function openModal(title,body,footer){document.getElementById('modal-title').textContent=title;document.getElementById('modal-body').innerHTML=body;document.getElementById('modal-footer').innerHTML=footer;document.getElementById('modal').classList.add('open');}
function badgeEstatus(e){
  const m={'activo':'green','ganado':'green','confirmado':'green','entregada':'green','aprobada':'green',
    'contacto':'blue','en proceso':'blue','enviada':'blue','ingreso':'green',
    'nuevo':'gray','borrador':'gray','inactivo':'gray',
    'propuesta':'yellow','pendiente':'yellow','pendiente de pago':'yellow',
    'negociacion':'purple',
    'perdido':'red','rechazada':'red','cancelada':'red','egreso':'red',
    'eliminado':'orange'};
  const c=m[e?.toLowerCase()]||'gray';
  return `<span class="badge badge-${c}">${e||'—'}</span>`;
}
function showPage(page){
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>{if(n.getAttribute('onclick')?.includes(page))n.classList.add('active');});
  const titles={dashboard:'Dashboard',clientes:'Clientes',prospectos:'Prospectos',cotizaciones:'Cotizaciones',ordenes:'Órdenes de Compra',contabilidad:'Contabilidad',vendedores:'Vendedores',configuracion:'Configuración'};
  document.getElementById('page-title').textContent=titles[page]||page;
  pages[page]();
}

// número a letra
const U=['','un','dos','tres','cuatro','cinco','seis','siete','ocho','nueve','diez','once','doce','trece','catorce','quince','dieciséis','diecisiete','dieciocho','diecinueve'];
const D=['','','veinte','treinta','cuarenta','cincuenta','sesenta','setenta','ochenta','noventa'];
const C=['','ciento','doscientos','trescientos','cuatrocientos','quinientos','seiscientos','setecientos','ochocientos','novecientos'];
function cent(n){if(n===100)return 'cien';if(!n)return '';const c=Math.floor(n/100),d=Math.floor((n%100)/10),u=n%10;let s=C[c]?(C[c]+' '):'';const du=d*10+u;if(du<20)s+=U[du];else if(!u)s+=D[d];else s+=D[d]+' y '+U[u];return s.trim();}
function miles(n){if(!n)return '';const m=Math.floor(n/1000),r=n%1000;let s=m===1?'mil':m>0?cent(m)+' mil':'';if(r>0)s+=(s?' ':'')+cent(r);return s.trim();}
function millones(n){if(!n)return 'cero';const mm=Math.floor(n/1000000),r=n%1000000;let s=mm===1?'un millón':mm>0?cent(mm)+' millones':'';if(r>0)s+=(s?' ':'')+miles(r);return s.trim()||'cero';}
function numLetra(t,cur='MXN'){const names={MXN:['peso','pesos','M.N.'],USD:['dólar','dólares','USD'],EUR:['euro','euros','EUR']};const nm=names[cur]||names.MXN;const e=Math.floor(t),cc=Math.round((t-e)*100);const l=millones(e);const mo=e===1?nm[0]:nm[1];return 'Son: '+l.charAt(0).toUpperCase()+l.slice(1)+' '+mo+' '+String(cc).padStart(2,'0')+'/100 '+nm[2];}

const pages={};

// ===================== DASHBOARD =====================
pages.dashboard=async function(){
  const c=document.getElementById('content');
  c.innerHTML=`<div style="text-align:center;padding:40px;color:#6b7280;">Cargando...</div>`;
  const [cls,pros,cots,ords,cont]=await Promise.all([
    sb.from('clientes').select('id,estatus'),
    sb.from('prospectos').select('id,etapa,valor_estimado,estatus'),
    sb.from('cotizaciones').select('id,estatus,total'),
    sb.from('ordenes').select('id,estatus,total'),
    sb.from('contabilidad').select('tipo,monto')
  ]);
  const allClientes=cls.data||[];
  const totalClientes=allClientes.length;
  const clientesActivos=allClientes.filter(x=>x.estatus==='activo').length;
  const clientesInactivos=allClientes.filter(x=>x.estatus==='inactivo').length;
  const allProsp=(pros.data||[]);
  const prospecActivos=allProsp.filter(p=>p.estatus!=='eliminado');
  const prospecEliminados=allProsp.filter(p=>p.estatus==='eliminado').length;
  const pipVal=prospecActivos.reduce((s,p)=>s+(parseFloat(p.valor_estimado)||0),0);
  const cotAprob=(cots.data||[]).filter(x=>x.estatus==='aprobada').reduce((s,x)=>s+(parseFloat(x.total)||0),0);
  const ordPend=(ords.data||[]).filter(x=>x.estatus==='pendiente').length;
  const ingresos=(cont.data||[]).filter(x=>x.tipo==='ingreso').reduce((s,x)=>s+(parseFloat(x.monto)||0),0);
  const egresos=(cont.data||[]).filter(x=>x.tipo==='egreso').reduce((s,x)=>s+(parseFloat(x.monto)||0),0);

  c.innerHTML=`
  <div class="stat-grid">
    <div class="stat-card">
      <div class="label">Clientes</div>
      <div class="value" style="color:var(--accent)">${totalClientes}</div>
      <div class="sub-row">
        <span class="sub-item" style="color:var(--success)">✓ Activos: <strong>${clientesActivos}</strong></span>
        <span class="sub-item" style="color:var(--muted)">✗ Inactivos: <strong>${clientesInactivos}</strong></span>
      </div>
    </div>
    <div class="stat-card">
      <div class="label">Prospectos activos</div>
      <div class="value" style="color:var(--warning)">${prospecActivos.length}</div>
      <div class="sub-row">
        <span class="sub-item">Pipeline: ${fmt(pipVal)}</span>
        <span class="sub-item" style="color:var(--danger)">Eliminados: ${prospecEliminados}</span>
      </div>
    </div>
    <div class="stat-card"><div class="label">Cotizaciones aprobadas</div><div class="value" style="color:var(--success)">${fmt(cotAprob)}</div><div class="sub">Valor total aprobado</div></div>
    <div class="stat-card"><div class="label">Órdenes pendientes</div><div class="value" style="color:var(--danger)">${ordPend}</div><div class="sub">Por procesar</div></div>
    <div class="stat-card"><div class="label">Ingresos</div><div class="value" style="color:var(--success)">${fmt(ingresos)}</div><div class="sub">Total registrado</div></div>
    <div class="stat-card"><div class="label">Balance</div><div class="value" style="color:${ingresos-egresos>=0?'var(--success)':'var(--danger)'}">${fmt(ingresos-egresos)}</div><div class="sub">Ingresos - Egresos</div></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
    <div class="panel"><div class="panel-header"><h3>Últimas cotizaciones</h3><button class="btn btn-secondary btn-sm" onclick="showPage('cotizaciones')">Ver todas</button></div><div class="panel-body" id="dash-cots"></div></div>
    <div class="panel"><div class="panel-header"><h3>Órdenes recientes</h3><button class="btn btn-secondary btn-sm" onclick="showPage('ordenes')">Ver todas</button></div><div class="panel-body" id="dash-ords"></div></div>
  </div>`;
  const {data:dcots}=await sb.from('cotizaciones').select('numero,cliente_nombre,total,estatus,fecha').order('created_at',{ascending:false}).limit(5);
  document.getElementById('dash-cots').innerHTML=(dcots&&dcots.length)?`<table class="data"><thead><tr><th>N°</th><th>Cliente</th><th>Total</th><th>Estatus</th></tr></thead><tbody>${dcots.map(r=>`<tr><td>${r.numero}</td><td>${r.cliente_nombre||'—'}</td><td>${fmt(r.total)}</td><td>${badgeEstatus(r.estatus)}</td></tr>`).join('')}</tbody></table>`:`<div class="empty">Sin cotizaciones</div>`;
  const {data:dords}=await sb.from('ordenes').select('numero,cliente_nombre,total,estatus,fecha_orden').order('created_at',{ascending:false}).limit(5);
  document.getElementById('dash-ords').innerHTML=(dords&&dords.length)?`<table class="data"><thead><tr><th>N°</th><th>Cliente</th><th>Total</th><th>Estatus</th></tr></thead><tbody>${dords.map(r=>`<tr><td>${r.numero}</td><td>${r.cliente_nombre||'—'}</td><td>${fmt(r.total)}</td><td>${badgeEstatus(r.estatus)}</td></tr>`).join('')}</tbody></table>`:`<div class="empty">Sin órdenes</div>`;
};

// ===================== CLIENTES =====================
pages.clientes=async function(){
  const c=document.getElementById('content');
  c.innerHTML=`<div class="search-bar"><input type="text" id="cli-search" placeholder="Buscar cliente..." oninput="filterClientes()" /><button class="btn btn-primary" onclick="modalCliente()">+ Nuevo cliente</button></div><div class="panel"><div class="panel-body tbl-wrap"><div id="cli-table">Cargando...</div></div></div>`;
  await loadClientes();
};
let _clientes=[];
async function loadClientes(){const{data}=await sb.from('clientes').select('*').order('nombre');_clientes=data||[];renderClientes(_clientes);}
function filterClientes(){const q=document.getElementById('cli-search')?.value?.toLowerCase()||'';renderClientes(_clientes.filter(c=>(c.nombre+c.empresa+c.email+c.ciudad).toLowerCase().includes(q)));}
function renderClientes(list){
  const el=document.getElementById('cli-table');if(!el)return;
  if(!list.length){el.innerHTML=`<div class="empty"><div class="icon">👥</div><div>No hay clientes</div></div>`;return;}

  openModal(id?'Editar cotización':'Nueva cotización',body,`<button class="btn btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveCotizacion('${id||''}')">Guardar cotización</button>`);

}

function addCotItem(desc='',tipo='producto',qty=1,price=0,focus=true){
  const id=_cotNextId++;_cotItems.push({id,desc,tipo,qty,price});
  const tbody=document.getElementById('cf-items');if(!tbody)return;
  const tr=document.createElement('tr');tr.id='cot-row-'+id;
  tr.innerHTML=`<td><input value="${desc}" placeholder="Descripción" oninput="updCotItem(${id},'desc',this.value)" style="width:100%;font-size:12px;padding:4px 6px;border:1px solid var(--border);border-radius:4px;" /></td><td><select onchange="updCotItem(${id},'tipo',this.value)" style="font-size:12px;padding:4px;border:1px solid var(--border);border-radius:4px;"><option value="producto" ${tipo==='producto'?'selected':''}>Prod.</option><option value="servicio" ${tipo==='servicio'?'selected':''}>Serv.</option></select></td><td><input type="number" min="1" value="${qty}" oninput="updCotItem(${id},'qty',this.value)" style="width:52px;font-size:12px;padding:4px;border:1px solid var(--border);border-radius:4px;" /></td><td><input type="number" min="0" step="0.01" value="${price}" oninput="updCotItem(${id},'price',this.value)" style="width:100px;font-size:12px;padding:4px;border:1px solid var(--border);border-radius:4px;" /></td><td style="text-align:right;font-size:12px;font-weight:600;" id="cot-sub-${id}">${fmt(qty*price)}</td><td><button onclick="remCotItem(${id})" style="background:none;border:none;cursor:pointer;color:#ef4444;font-size:14px;">✕</button></td>`;
  tbody.appendChild(tr);
  if(focus){const inp=tr.querySelector('input');if(inp)inp.focus();}
  calcCot();
}
function updCotItem(id,field,val){const it=_cotItems.find(i=>i.id===id);if(!it)return;it[field]=(field==='qty'||field==='price')?(parseFloat(val)||0):val;const el=document.getElementById('cot-sub-'+id);if(el)el.textContent=fmt(it.qty*it.price);calcCot();}
function remCotItem(id){_cotItems=_cotItems.filter(i=>i.id!==id);const r=document.getElementById('cot-row-'+id);if(r)r.remove();calcCot();}
function calcCot(){
  const sub=_cotItems.reduce((s,i)=>s+i.qty*i.price,0);
  const dp=parseFloat(document.getElementById('cf-desc')?.value)||0;
  const ip=parseFloat(document.getElementById('cf-iva')?.value)||0;
  const da=sub*dp/100,base=sub-da,ia=base*ip/100,tot=base+ia;
  const cur=document.getElementById('cf-mon')?.value||'MXN';
  const set=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
  set('cf-tsub',fmt(sub));set('cf-tdesc','-'+fmt(da));set('cf-tiva',fmt(ia));set('cf-ttot',fmt(tot));
  const il=document.getElementById('cf-ivalbl');if(il)il.textContent='IVA ('+ip+'%)';
  const le=document.getElementById('cf-letra');if(le)le.textContent=numLetra(tot,cur);
}
function getCondiciones(){

  const confirm = document.getElementById('sec-confirm')?.value;
  const msg = document.getElementById('sec-msg');
  if(actual !== ADMIN_PASS){msg.style.display='block';msg.style.color='var(--danger)';msg.textContent='La contraseña actual es incorrecta.';return;}
  if(!nueva||nueva.length<6){msg.style.display='block';msg.style.color='var(--danger)';msg.textContent='La nueva contraseña debe tener al menos 6 caracteres.';return;}
  if(nueva!==confirm){msg.style.display='block';msg.style.color='var(--danger)';msg.textContent='Las contraseñas no coinciden.';return;}
  // contraseña actualizada en memoria (reiniciar app para aplicar)
  msg.style.display='block';msg.style.color='var(--success)';msg.textContent='Contraseña cambiada. Recarga la app para aplicar.';
  ['sec-actual','sec-nueva','sec-confirm'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
}

function cfgCerrarSesion(){
  _adminAuth = false;
  showPage('dashboard');
  toast('Sesión de administrador cerrada');
}

async function cfgLoadVendedores(){
  const{data}=await sb.from('vendedores').select('nombre,activo').order('nombre');
  const el=document.getElementById('cfg-vend-list');if(!el)return;
  if(!data||!data.length){el.innerHTML='<div style="font-size:13px;color:var(--muted);">Sin vendedores registrados</div>';return;}
  el.innerHTML=`<table class="data"><thead><tr><th>Nombre</th><th>Estatus</th></tr></thead><tbody>${data.map(v=>`<tr><td>${v.nombre}</td><td>${v.activo?'<span class="badge badge-green">Activo</span>':'<span class="badge badge-gray">Inactivo</span>'}</td></tr>`).join('')}</tbody></table>`;
}



// ===================== INIT =====================
cargarConfigEmpresa().then(()=>pages.dashboard());
</script>
