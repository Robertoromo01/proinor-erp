<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PROINOR ERP CRM</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#f4f5f7;--sidebar:#1a1d23;--sidebar-hover:#2a2d35;--accent:#3b82f6;--accent-dark:#2563eb;--white:#fff;--border:#e5e7eb;--text:#111827;--muted:#6b7280;--success:#10b981;--warning:#f59e0b;--danger:#ef4444;--radius:8px;--shadow:0 1px 3px rgba(0,0,0,.08);}
body{font-family:Arial,sans-serif;font-size:14px;color:var(--text);background:var(--bg);display:flex;min-height:100vh;}
#sidebar{width:220px;background:var(--sidebar);display:flex;flex-direction:column;flex-shrink:0;min-height:100vh;}
#sidebar .logo{padding:20px 16px 16px;border-bottom:1px solid #2a2d35;}
#sidebar .logo h2{color:#fff;font-size:15px;font-weight:700;}
#sidebar .logo p{color:#9ca3af;font-size:11px;margin-top:2px;}
#sidebar nav{flex:1;padding:12px 0;overflow-y:auto;}
.nav-section{padding:8px 16px 4px;font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:.08em;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;color:#d1d5db;cursor:pointer;font-size:13px;transition:background .15s;}
.nav-item:hover{background:var(--sidebar-hover);color:#fff;}
.nav-item.active{background:var(--accent);color:#fff;}
.nav-item .icon{font-size:16px;width:20px;text-align:center;}
#main{flex:1;display:flex;flex-direction:column;min-width:0;}
#topbar{background:var(--white);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;}
#topbar h1{font-size:18px;font-weight:700;}
.user-chip{display:flex;align-items:center;gap:8px;background:var(--bg);padding:6px 12px;border-radius:20px;font-size:13px;}
#content{flex:1;padding:24px;overflow-y:auto;}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px;}
.stat-card{background:var(--white);border-radius:var(--radius);padding:16px 20px;box-shadow:var(--shadow);border:1px solid var(--border);}
.stat-card .label{font-size:12px;color:var(--muted);margin-bottom:6px;}
.stat-card .value{font-size:24px;font-weight:700;}
.stat-card .sub{font-size:12px;color:var(--muted);margin-top:4px;}
.stat-card .sub-row{display:flex;gap:12px;margin-top:6px;flex-wrap:wrap;}
.panel{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);margin-bottom:20px;}
.panel-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.panel-header h3{font-size:15px;font-weight:700;}
.panel-body{padding:20px;}
.tbl-wrap{overflow-x:auto;}
table.data{width:100%;border-collapse:collapse;font-size:13px;}
table.data th{background:#f9fafb;padding:10px 12px;text-align:left;font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);}
table.data td{padding:10px 12px;border-bottom:1px solid #f3f4f6;vertical-align:middle;}
table.data tr:hover td{background:#fafafa;}
table.data tr:last-child td{border-bottom:none;}
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:2px 10px;border-radius:20px;}
.badge-green{background:#d1fae5;color:#065f46;}
.badge-blue{background:#dbeafe;color:#1e40af;}
.badge-yellow{background:#fef3c7;color:#92400e;}
.badge-red{background:#fee2e2;color:#991b1b;}
.badge-gray{background:#f3f4f6;color:#374151;}
.badge-purple{background:#ede9fe;color:#5b21b6;}
.badge-orange{background:#ffedd5;color:#9a3412;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius);border:none;cursor:pointer;font-size:13px;font-weight:600;transition:all .15s;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:var(--accent-dark);}
.btn-secondary{background:#f3f4f6;color:var(--text);border:1px solid var(--border);}
.btn-secondary:hover{background:#e5e7eb;}
.btn-danger{background:#fee2e2;color:#991b1b;}
.btn-sm{padding:5px 10px;font-size:12px;}
.btn-icon{padding:6px;border-radius:6px;background:#f3f4f6;border:1px solid var(--border);cursor:pointer;font-size:14px;}
.btn-icon:hover{background:#e5e7eb;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.form-grid-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:14px;}
.form-group{display:flex;flex-direction:column;gap:4px;}
.form-group label{font-size:12px;color:var(--muted);font-weight:600;}
.form-group input,.form-group select,.form-group textarea{padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;color:var(--text);background:#fff;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:2px solid var(--accent);border-color:transparent;}
.form-group textarea{resize:vertical;min-height:70px;}
.form-section-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin:18px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--white);border-radius:12px;width:90%;max-width:820px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.modal-header{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-header h3{font-size:16px;font-weight:700;}
.modal-body{padding:24px;}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;}
.search-bar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.search-bar input{flex:1;min-width:200px;padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;}
.pipeline{display:grid;gap:12px;}
.pipeline-col{background:#f9fafb;border-radius:var(--radius);padding:12px;}
.pipeline-col h4{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;}
.pipeline-card{background:var(--white);border:1px solid var(--border);border-radius:6px;padding:10px 12px;margin-bottom:8px;cursor:pointer;}
.pipeline-card:hover{border-color:var(--accent);}
.pipeline-card .pname{font-weight:600;font-size:13px;}
.pipeline-card .pco{font-size:12px;color:var(--muted);}
.pipeline-card .pval{font-size:12px;color:var(--accent);margin-top:4px;font-weight:600;}
.ingreso-row td:first-child{border-left:3px solid var(--success);}
.egreso-row td:first-child{border-left:3px solid var(--danger);}
.tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:20px;flex-wrap:wrap;}
.tab{padding:10px 20px;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.empty{text-align:center;padding:48px 20px;color:var(--muted);}
.empty .icon{font-size:40px;margin-bottom:12px;}
#toast{position:fixed;bottom:24px;right:24px;background:#1a1d23;color:#fff;padding:12px 20px;border-radius:8px;font-size:13px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;}
#toast.show{opacity:1;}
.stock-alert{color:var(--danger);font-weight:700;}
.stock-ok{color:var(--success);}
.cot-items-table{width:100%;border-collapse:collapse;margin-bottom:8px;font-size:13px;}
.cot-items-table th{background:#f9fafb;padding:7px 8px;font-size:11px;text-align:left;border-bottom:1px solid var(--border);}
.cot-items-table td{padding:5px 6px;border-bottom:1px solid #f3f4f6;}
.cot-totals{display:flex;justify-content:flex-end;}
.cot-tbox{width:260px;}
.cot-trow{display:flex;justify-content:space-between;padding:4px 0;font-size:13px;border-bottom:1px solid #f3f4f6;}
.cot-trow.grand{font-weight:700;font-size:15px;border:none;border-top:2px solid #222;margin-top:4px;padding-top:8px;}
.cot-letra{font-size:11px;font-style:italic;color:var(--muted);margin-top:6px;padding:5px 8px;background:#f8f8f8;border-left:3px solid #ccc;border-radius:3px;}
.check-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 14px;margin-top:6px;}
.check-item{display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;}
.check-item input[type=checkbox]{width:auto;}
.file-upload-area{border:2px dashed var(--border);border-radius:var(--radius);padding:20px;text-align:center;cursor:pointer;transition:border-color .2s;}
.file-upload-area:hover{border-color:var(--accent);}
.file-upload-area.has-file{border-color:var(--success);background:#f0fdf4;}
.file-info{display:flex;align-items:center;gap:8px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:6px;padding:8px 12px;font-size:13px;margin-top:8px;}
.img-preview{width:50px;height:50px;object-fit:contain;border:1px solid var(--border);border-radius:6px;background:#f9fafb;}
@media(max-width:768px){#sidebar{width:60px;}.nav-item span,.nav-section,.logo p,.logo h2{display:none;}.nav-item{justify-content:center;}}
</style>
</head>

  <nav>
    <div class="nav-section">Principal</div>

</div>

<script>
const SUPA_URL='https://myvoeelcbnmhijrxevju.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im15dm9lZWxjYm5taGlqcnhldmp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0MDQ4OTQsImV4cCI6MjA5Nzk4MDg5NH0.gDA9tc7LQ5bfhdZAWXG-B4wGWfDewMvW7YPlTMdNZcI';
const sb=supabase.createClient(SUPA_URL,SUPA_KEY);
let ADMIN_PASS='2026Proinor.';
let _adminAuth=false,_logoDataUrl=null,_empConfig={},_categorias=[];

function fmt(n){return '$'+(parseFloat(n)||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');}
function fmtDate(d){if(!d)return '—';return new Date(d+'T12:00:00').toLocaleDateString('es-MX',{day:'2-digit',month:'short',year:'numeric'});}
function toast(msg,ok=true){const t=document.getElementById('toast');t.textContent=msg;t.style.background=ok?'#065f46':'#991b1b';t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
function closeModal(){document.getElementById('modal').classList.remove('open');}
function openModal(title,body,footer){document.getElementById('modal-title').textContent=title;document.getElementById('modal-body').innerHTML=body;document.getElementById('modal-footer').innerHTML=footer;document.getElementById('modal').classList.add('open');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function badgeEstatus(e){const m={'activo':'green','ganado':'green','confirmado':'green','entregada':'green','aprobada':'green','contacto':'blue','en proceso':'blue','enviada':'blue','nuevo':'gray','borrador':'gray','inactivo':'gray','propuesta':'yellow','pendiente':'yellow','pendiente de pago':'yellow','negociacion':'purple','perdido':'red','rechazada':'red','cancelada':'red','eliminado':'orange','ingreso':'green','egreso':'red'};return `<span class="badge badge-${m[e?.toLowerCase()]||'gray'}">${e||'—'}</span>`;}
function showPage(page){document.querySelectorAll('.nav-item').forEach(n=>{n.classList.remove('active');if(n.getAttribute('onclick')?.includes(`'${page}'`))n.classList.add('active');});const titles={dashboard:'Dashboard',clientes:'Clientes',prospectos:'Prospectos',cotizaciones:'Cotizaciones',ordenes:'Órdenes de compra',proveedores:'Proveedores',ordenes_proveedor:'OC a Proveedores',catalogo:'Catálogo de Productos',inventario:'Inventario',contabilidad:'Contabilidad',vendedores:'Vendedores',configuracion:'Configuración'};document.getElementById('page-title').textContent=titles[page]||page;pages[page]();}
function adminGuard(cb){if(_adminAuth){cb();return;}openModal('🔐 Administrador',`<div class="form-group" style="margin-bottom:12px;"><label>Contraseña</label><input type="password" id="ag-pass" onkeydown="if(event.key==='Enter')checkAG()" autofocus /></div><div id="ag-err" style="color:var(--danger);font-size:12px;display:none;">Contraseña incorrecta</div>`,`<button class="btn btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="checkAG()">Entrar</button>`);window._agCb=cb;}
function checkAG(){const v=document.getElementById('ag-pass')?.value;if(v===ADMIN_PASS){_adminAuth=true;closeModal();if(window._agCb)window._agCb();}else{document.getElementById('ag-err').style.display='block';document.getElementById('ag-pass').value='';}}

const U=['','un','dos','tres','cuatro','cinco','seis','siete','ocho','nueve','diez','once','doce','trece','catorce','quince','dieciséis','diecisiete','dieciocho','diecinueve'];
const D=['','','veinte','treinta','cuarenta','cincuenta','sesenta','setenta','ochenta','noventa'];
const C=['','ciento','doscientos','trescientos','cuatrocientos','quinientos','seiscientos','setecientos','ochocientos','novecientos'];
function cent(n){if(n===100)return 'cien';if(!n)return '';const c=Math.floor(n/100),d=Math.floor((n%100)/10),u=n%10;let s=C[c]?(C[c]+' '):'';const du=d*10+u;if(du<20)s+=U[du];else if(!u)s+=D[d];else s+=D[d]+' y '+U[u];return s.trim();}
function miles(n){if(!n)return '';const m=Math.floor(n/1000),r=n%1000;let s=m===1?'mil':m>0?cent(m)+' mil':'';if(r>0)s+=(s?' ':'')+cent(r);return s.trim();}
function millones(n){if(!n)return 'cero';const mm=Math.floor(n/1000000),r=n%1000000;let s=mm===1?'un millón':mm>0?cent(mm)+' millones':'';if(r>0)s+=(s?' ':'')+miles(r);return s.trim()||'cero';}
function numLetra(t,cur='MXN'){const names={MXN:['peso','pesos','M.N.'],USD:['dólar','dólares','USD'],EUR:['euro','euros','EUR']};const nm=names[cur]||names.MXN;const e=Math.floor(t),cc=Math.round((t-e)*100);const l=millones(e);return 'Son: '+l.charAt(0).toUpperCase()+l.slice(1)+' '+(e===1?nm[0]:nm[1])+' '+String(cc).padStart(2,'0')+'/100 '+nm[2];}
function fileToB64(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.onerror=rej;r.readAsDataURL(file);});}

async function cargarConfigEmpresa(){
  const{data}=await sb.from('configuracion').select('*').eq('id','empresa').single();
  if(data){_empConfig={nombre:data.nombre||'',rfc:data.rfc||'',tel:data.tel||'',email:data.email||'',dir:data.dir||'',web:data.web||'',slogan:data.slogan||''};_logoDataUrl=data.logo_url||null;}
  const{data:cats}=await sb.from('categorias_descuento').select('*').order('nombre');

}

const pages={};
pages.dashboard=async function(){
  const c=document.getElementById('content');
  c.innerHTML=`<div style="text-align:center;padding:40px;color:var(--muted);">Cargando...</div>`;
  const[cls,pros,cots,ords,cont,inv]=await Promise.all([sb.from('clientes').select('id,estatus'),sb.from('prospectos').select('id,etapa,valor_estimado,estatus'),sb.from('cotizaciones').select('id,estatus,total,created_at'),sb.from('ordenes').select('id,estatus,total'),sb.from('contabilidad').select('tipo,monto,estatus'),sb.from('inventario').select('id,nombre,stock_actual,stock_minimo,sku')]);
  const allCli=cls.data||[];const totalCli=allCli.length,cliAct=allCli.filter(x=>x.estatus==='activo').length,cliInact=allCli.filter(x=>x.estatus==='inactivo').length;
  const allPros=pros.data||[];const prosAct=allPros.filter(p=>p.estatus!=='eliminado');const prosElim=allPros.filter(p=>p.estatus==='eliminado').length;
  const pipVal=prosAct.reduce((s,p)=>s+(parseFloat(p.valor_estimado)||0),0);
  const prosGan=prosAct.filter(p=>p.etapa==='ganado').length;const tasaConv=prosAct.length>0?Math.round(prosGan/prosAct.length*100):0;
  const allCots=cots.data||[];const cotAprobadas=allCots.filter(x=>x.estatus==='aprobada');const cotAprob=cotAprobadas.reduce((s,x)=>s+(parseFloat(x.total)||0),0);const ticketProm=cotAprobadas.length>0?cotAprob/cotAprobadas.length:0;
  const cotPorEst={borrador:allCots.filter(x=>x.estatus==='borrador').length,enviada:allCots.filter(x=>x.estatus==='enviada').length,aprobada:cotAprobadas.length,rechazada:allCots.filter(x=>x.estatus==='rechazada').length};
  const ordPend=(ords.data||[]).filter(x=>x.estatus==='pendiente').length;
  const allCont=cont.data||[];const ingresos=allCont.filter(x=>x.tipo==='ingreso').reduce((s,x)=>s+(parseFloat(x.monto)||0),0);const egresos=allCont.filter(x=>x.tipo==='egreso').reduce((s,x)=>s+(parseFloat(x.monto)||0),0);const cxc=allCont.filter(x=>x.estatus==='pendiente de pago').reduce((s,x)=>s+(parseFloat(x.monto)||0),0);
  const allInv=inv.data||[];const invBajo=allInv.filter(x=>(parseFloat(x.stock_actual)||0)<=(parseFloat(x.stock_minimo)||0)).length;
  c.innerHTML=`
  <div class="stat-grid">
    <div class="stat-card"><div class="label">Clientes</div><div class="value" style="color:var(--accent)">${totalCli}</div><div class="sub-row"><span style="font-size:12px;color:var(--success)">✓ Activos: <b>${cliAct}</b></span><span style="font-size:12px;color:var(--muted)">✗ Inactivos: <b>${cliInact}</b></span></div></div>
    <div class="stat-card"><div class="label">Prospectos</div><div class="value" style="color:var(--warning)">${prosAct.length}</div><div class="sub-row"><span style="font-size:12px;">Pipeline: ${fmt(pipVal)}</span><span style="font-size:12px;color:var(--danger)">Elim: ${prosElim}</span></div></div>
    <div class="stat-card"><div class="label">Tasa de conversión</div><div class="value" style="color:var(--success)">${tasaConv}%</div><div class="sub">Prospectos ganados</div></div>
    <div class="stat-card"><div class="label">Ticket promedio</div><div class="value" style="color:var(--accent)">${fmt(ticketProm)}</div><div class="sub">Cots. aprobadas</div></div>
    <div class="stat-card"><div class="label">Cots. aprobadas</div><div class="value" style="color:var(--success)">${fmt(cotAprob)}</div><div class="sub">Valor total</div></div>
    <div class="stat-card"><div class="label">Órdenes pendientes</div><div class="value" style="color:var(--danger)">${ordPend}</div><div class="sub">Por procesar</div></div>

function onCotCliChange(){const sel=document.getElementById('cf-cli');const opt=sel?.options[sel.selectedIndex];if(opt?.value){const desc=parseFloat(opt.dataset.desc)||0;const cat=opt.dataset.cat||'';const descEl=document.getElementById('cf-desc');const catLbl=document.getElementById('cf-cat-lbl');if(descEl)descEl.value=desc;if(catLbl)catLbl.textContent=cat?`(Cat. ${cat})`:'';calcCot();}}

async function exportCot(id){const{data:d}=await sb.from('cotizaciones').select('*').eq('id',id).single();if(!d)return;const items=d.items||[];const cond=d.condiciones||{};const sub=items.reduce((s,i)=>s+i.qty*i.price,0);const da=sub*(d.descuento||0)/100,base=sub-da,ia=base*(d.iva||0)/100,tot=base+ia;const rows=items.map(it=>`<tr><td>${esc(it.desc||'—')}</td><td style="text-align:center">${it.tipo}</td><td style="text-align:center">${it.qty}</td><td style="text-align:right">$${(it.price||0).toFixed(2)}</td><td style="text-align:right">$${((it.qty||0)*(it.price||0)).toFixed(2)}</td></tr>`).join('');const condBlock=[cond.condicion_pago?['Condición de pago',cond.condicion_pago]:null,cond.entrega?['Tiempo de entrega',cond.entrega]:null,cond.garantia&&cond.garantia!=='Sin garantía'?['Garantía',cond.garantia]:null,cond.lugar_entrega?['Lugar de entrega',cond.lugar_entrega]:null,cond.metodos_pago?.length?['Métodos de pago',cond.metodos_pago.join(', ')]:null,d.validez?['Validez',d.validez]:null].filter(Boolean).map(([k,v])=>`<tr><td style="color:#666;width:180px;padding:5px 0;">${esc(k)}</td><td><strong>${esc(v)}</strong></td></tr>`).join('');const firmas=(cond.elaboro||cond.reviso)?`<div style="display:grid;grid-template-columns:1fr 1fr;gap:40px;margin-top:40px;"><div style="text-align:center;"><div style="border-top:1px solid #333;margin-bottom:8px;"></div><p style="font-weight:700;">${esc(cond.elaboro||'___')}</p><p style="font-size:11px;color:#888;">Elaboró</p></div><div style="text-align:center;"><div style="border-top:1px solid #333;margin-bottom:8px;"></div><p style="font-weight:700;">${esc(cond.reviso||'___')}</p><p style="font-size:11px;color:#888;">Revisó / Autorizó</p></div></div>`:'';const logoHtml=_logoDataUrl?`<img src="${_logoDataUrl}" style="max-height:70px;max-width:160px;object-fit:contain;" />`:'';const empN=_empConfig.nombre||'PROINOR ERP CRM';const empSub=[_empConfig.rfc?`RFC: ${_empConfig.rfc}`:null,_empConfig.tel?`Tel: ${_empConfig.tel}`:null,_empConfig.email||null,_empConfig.dir||null,_empConfig.web||null].filter(Boolean).map(l=>`<p style="margin:1px 0;">${esc(l)}</p>`).join('');const html=`<!DOCTYPE html><html><head><meta charset="utf-8"><title>${esc(d.numero)}</title><style>body{font-family:Arial,sans-serif;font-size:13px;color:#222;padding:40px;max-width:760px;margin:0 auto}.header{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid #222;padding-bottom:16px;margin-bottom:20px;gap:20px}.header-left{display:flex;align-items:flex-start;gap:14px}.co-name{font-size:20px;font-weight:700;margin-bottom:4px}.co-sub{font-size:11px;color:#555;line-height:1.7}.parties{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}.party{background:#f8f8f8;padding:12px;border-radius:6px}.party h3{font-size:10px;text-transform:uppercase;color:#888;margin-bottom:6px}table{width:100%;border-collapse:collapse;margin-bottom:16px}th{background:#f4f4f4;padding:8px;font-size:11px;text-transform:uppercase;border-bottom:1px solid #ddd}td{padding:8px;border-bottom:1px solid #eee}.tbox{width:260px;margin-left:auto;border:1px solid #eee;padding:12px;border-radius:6px}.trow{display:flex;justify-content:space-between;padding:4px 0;font-size:13px;border-bottom:1px solid #f0f0f0}.grand{font-weight:700;font-size:15px;border-top:2px solid #222!important;border-bottom:none!important;margin-top:4px;padding-top:8px}.letra{font-size:11px;font-style:italic;color:#666;margin-top:6px;background:#f8f8f8;padding:6px;border-left:3px solid #ccc}.cond-sec{margin-bottom:16px}.cond-sec h3{font-size:10px;text-transform:uppercase;color:#888;border-bottom:1px solid #ddd;padding-bottom:4px;margin-bottom:8px}.info-box{background:#f8f8f8;padding:10px;font-size:12px;color:#444;border-left:3px solid #ccc;white-space:pre-wrap}.footer{margin-top:28px;padding-top:10px;border-top:1px solid #ddd;font-size:11px;color:#aaa;display:flex;justify-content:space-between}@media print{body{-webkit-print-color-adjust:exact}}</style async function loadCat(){const{data}=await sb.from('catalogo').select('*').order('nombre');_cat=data||[];renderCat(_cat);}
function filterCat(){const q=(document.getElementById('cat-search')?.value||'').toLowerCase();renderCat(_cat.filter(p=>(p.nombre+(p.sku||'')+(p.descripcion||'')+(p.proveedor_nombre||'')).toLowerCase().includes(q)));}
function renderCat(list){const el=document.getElementById('cat-table');if(!el)return;if(!list.length){el.innerHTML=`<div class="empty"><div class="icon">📋</div><div>Sin productos</div></div>`;return;}el.innerHTML=`<table class="data"><thead><tr><th>SKU</th><th>Imagen</th><th>Nombre</th><th>Proveedor</th><th>P. Costo</th><th>P. Venta</th><th>Margen</th><th>Estatus</th><th>Acciones</th></tr></thead><tbody>${list.map(r=>{const margen=r.precio_venta>0?Math.round((r.precio_venta-r.precio_costo)/r.precio_venta*100):0;return `<tr><td><span class="badge badge-blue">${r.sku||'—'}</span></td><td>${r.imagen_url?`<img src="${r.imagen_url}" class="img-preview" />`:'<div style="width:40px;height:40px;background:#f3f4f6;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:18px;">📦</div>'}</td><td><strong>${esc(r.nombre)}</strong><br><span style="font-size:11px;color:var(--muted);">${esc(r.descripcion||'').substring(0,60)}</span></td><td>${r.proveedor_nombre||'—'}</td><td>${fmt(r.precio_costo)}</td><td>${fmt(r.precio_venta)}</td><td><span class="badge ${margen>=20?'badge-green':margen>=10?'badge-yellow':'badge-red'}">${margen}%</span></td><td>${badgeEstatus(r.estatus)}</td><td><button class="btn-icon" onclick="modalCatalogo('${r.id}')">✏️</button> <button class="btn-icon" onclick="delCat('${r.id}')">🗑️</button></td></tr>`;}).join('')}</tbody></table>`;}
let _catImgUrl=null;
async function modalCatalogo(id){_catImgUrl=null;let d={nombre:'',descripcion:'',especificaciones:'',certificaciones:'',proveedor_id:null,proveedor_nombre:'',precio_costo:0,precio_venta:0,unidad:'pza',imagen_url:'',estatus:'activo'};if(id){const{data}=await sb.from('catalogo').select('*').eq('id',id).single();if(data){d=data;_catImgUrl=data.imagen_url||null;}}const{data:provs}=await sb.from('proveedores').select('id,nombre').eq('estatus','activo').order('nombre');const pOpts=(provs||[]).map(p=>`<option value="${p.id}" data-name="${esc(p.nombre)}" ${d.proveedor_id===p.id?'selected':''}>${esc(p.nombre)}</option>`).join('');openModal(id?'Editar producto':'Nuevo producto',`<div class="form-grid"><div class="form-group"><label>Nombre *</label><input id="catf-nombre" value="${esc(d.nombre)}" /></div><div class="form-group"><label>Proveedor</label><select id="catf-prov"><option value="">— Sin proveedor —</option>${pOpts}</select></div><div class="form-group"><label>Precio de costo</label><input type="number" id="catf-costo" value="${d.precio_costo||0}" min="0" step="0.01" /></div><div class="form-group"><label>Precio de venta</label><input type="number" id="catf-venta" value="${d.precio_venta||0}" min="0" step="0.01" /></div><div class="form-group"><label>Unidad</label><input id="catf-unidad" value="${esc(d.unidad||'pza')}" placeholder="pza, kg, lt..." /></div><div class="form-group"><label>Estatus</label><select id="catf-est"><option ${d.estatus==='activo'?'selected':''}>activo</option><option ${d.estatus==='inactivo'?'selected':''}>inactivo</option></select></div><div class="form-group" style="grid-column:span 2"><label>Descripción</label><textarea id="catf-desc">${esc(d.descripcion||'')}</textarea></div><div class="form-group" style="grid-column:span 2"><label>Especificaciones técnicas</label><textarea id="catf-spec">${esc(d.especificaciones||'')}</textarea></div><div class="form-group" style="grid-column:span 2"><label>Certificaciones</label><input id="catf-cert" value="${esc(d.certificaciones||'')}" placeholder="ISO 9001, CE, UL..." /></div></div><div class="form-section-title">Imagen del producto</div><div style="display:flex;align-items:center;gap:16px;"><div id="catf-img-prev" style="width:80px;height:80px;border:1px solid var(--border);border-radius:8px;overflow:hidden;background:#f9fafb;display:flex;align-items:center;justify-content:center;">${_catImgUrl?`<img src="${_catImgUrl}" style="width:100%;height:100%;object-fit:contain;" />`:'<span style="font-size:24px;">📦</span>'}</div><div><input type="file" id="catf-img-input" accept="image/*" style="display:none;" onchange="loadCatImg(event)" /><button class="btn btn-secondary btn-sm" onclick="document.getElementById('catf-img-input').click()">📷 Subir imagen</button></div></div>`,`<button class="btn btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveCatalogo('${id||''}')">Guardar</button>`);}
function loadCatImg(e){const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=ev=>{_catImgUrl=ev.target.result;const prev=document.getElementById('catf-img-prev');if(prev)prev.innerHTML=`<img src="${_catImgUrl}" style="width:100%;height:100%;object-fit:contain;" />`;};r.readAsDataURL(file);}
async function saveCatalogo(id){const pSel=document.getElementById('catf-prov');const pOpt=pSel?.options[pSel.selectedIndex];const obj={nombre:document.getElementById('catf-nombre').value,descripcion:document.getElementById('catf-desc').value,especificaciones:document.getElementById('catf-spec').value,certificaciones:document.getElementById('catf-cert').value,proveedor_id:pSel?.value||null,proveedor_nombre:pOpt?.value?pOpt.dataset.name||'':'',precio_costo:parseFloat(document.getElementById('catf-costo').value)||0,precio_venta:parseFloat(document.getElementById('catf-venta').value)||0,unidad:document.getElementById('catf-unidad').value||'pza',estatus:document.getElementById('catf-est').value,updated_at:new Date().toISOString()};if(_catImgUrl)obj.imagen_url=_catImgUrl;if(!obj.nombre){toast('Nombre requerido',false);return;}if(!id){const{data:last}=await sb.from('catalogo').select('sku').order('created_at',{ascending:false}).limit(1);let n=1;if(last?.length&&last[0].sku){const m=last[0].sku.match(/\d+/);if(m)n=parseInt(m[0])+1;}obj.sku='PRO-'+String(n).padStart(4,'0');const{data:newProd,error:eI}=await sb.from('catalogo').insert(obj).select().single();if(eI){toast('Error: '+eI.message,false);return;}await sb.from('inventario').insert({catalogo_id:newProd.id,sku:newProd.sku,nombre:newProd.nombre,stock_actual:0,stock_minimo:0,unidad:obj.unidad});toast('Producto creado ✓');closeModal();await loadCat();return;}const{error}=await sb.from('catalogo').update(obj).eq('id',id);if(error){toast('Error: '+error.message,false);return;}toast('Actualizado ✓');closeModal();await loadCat();}
async function delCat(id){if(!confirm('¿Eliminar?'))return;await sb.from('catalogo').delete().eq('id',id);toast('Eliminado');await loadCat();}
let _inv=[];
pages.inventario=async function(){const c=document.getElementById('content');c.innerHTML=`<div class="search-bar"><input type="text" id="inv-search" placeholder="Buscar producto..." oninput="filterInv()" /><select id="inv-filter" onchange="filterInv()" style="padding:8px;border:1px solid var(--border);border-radius:var(--radius);"><option value="">Todo</option><option value="alerta">Solo alertas</option></select></div><div id="inv-stats" style="margin-bottom:16px;"></div><div class="panel"><div class="panel-body tbl-wrap"><div id="inv-table">Cargando...</div></div></div>`;await loadInv();};
async function loadInv(){const{data}=await sb.from('inventario').select('*').order('nombre');_inv=data||[];renderInvStats();renderInv(_inv);}
function filterInv(){const q=(document.getElementById('inv-search')?.value||'').toLowerCase();const f=document.getElementById('inv-filter')?.value||'';let list=_inv.filter(i=>(i.nombre+(i.sku||'')+(i.ubicacion||'')).toLowerCase().includes(q));if(f==='alerta')list=list.filter(i=>(parseFloat(i.stock_actual)||0)<=(parseFloat(i.stock_minimo)||0));renderInv(list);}
function renderInvStats(){const total=_inv.length;const alertas=_inv.filter(i=>(parseFloat(i.stock_actual)||0)<=(parseFloat(i.stock_minimo)||0)).length;const el=document.getElementById('inv-stats');if(!el)return;el.innerHTML=`<div class="stat-grid" style="grid-template-columns:repeat(3,1fr);"><div class="stat-card"><div class="label">Total productos</div><div class="value" style="color:var(--accent)">${total}</div></div><div class="stat-card"><div class="label">Stock OK</div><div class="value" style="color:var(--success)">${total-alertas}</div></div><div class="stat-card"><div class="label">Bajo stock mínimo</div><div class="value" style="color:var(--danger)">${alertas}</div></div></div>`;}
function renderInv(list){const el=document.getElementById('inv-table');if(!el)return;if(!list.length){el.innerHTML=`<div class="empty"><div class="icon">🏪</div><div>Sin productos</div></div>`;return;}el.innerHTML=`<table class="data"><thead><tr><th>SKU</th><th>Producto</th><th>Stock actual</th><th>Mínimo</th><th>Máximo</th><th>Unidad</th><th>Ubicación</th><th>Estado</th><th>Acciones</th></tr></thead><tbody>${list.map(r=>{const alerta=(parseFloat(r.stock_actual)||0)<=(parseFloat(r.stock_minimo)||0);return `<tr><td><span class="badge badge-blue">${r.sku||'—'}</span></td><td><strong>${esc(r.nombre)}</strong></td><td class="${alerta?'stock-alert':'stock-ok'}">${r.stock_actual}</td><td>${r.stock_minimo}</td><td>${r.stock_maximo||'—'}</td><td>${r.unidad||'pza'}</td><td>${r.ubicacion||'—'}</td><td>${alerta?'<span class="badge badge-red">⚠ Bajo</span>':'<span class="badge badge-green">OK</span>'}</td><td><button class="btn-icon" title="Entrada" onclick="modalMovInv('${r.id}','${esc(r.nombre)}',${r.stock_actual},'entrada')">📥</button> <button class="btn-icon" title="Salida" onclick="modalMovInv('${r.id}','${esc(r.nombre)}',${r.stock_actual},'salida')">📤</button> <button class="btn-icon" title="Configurar" onclick="modalEditInv('${r.id}')">⚙️</button> <button class="btn-icon" title="Historial" onclick="verHistorialInv('${r.id}','${esc(r.nombre)}')">📋</button></td></tr>`;}).join('')}</tbody></table>`;}
async function modalMovInv(invId,nombre,stockActual,tipo){openModal(`${tipo==='entrada'?'📥 Entrada':'📤 Salida'} — ${nombre}`,`<div style="background:#f9fafb;padding:12px;border-radius:8px;margin-bottom:16px;font-size:13px;"><b>Stock actual:</b> ${stockActual}</div><div class="form-grid"><div class="form-group"><label>Tipo</label><select id="mov-tipo"><option value="entrada" ${tipo==='entrada'?'selected':''}>Entrada</option><option value="salida" ${tipo==='salida'?'selected':''}>Salida</option><option value="ajuste">Ajuste (reemplaza stock)</option></select></div><div class="form-group"><label>Cantidad</label><input type="number" id="mov-cant" min="0.01" step="0.01" value="1" /></div><div class="form-group"><label>Referencia (OC, factura...)</label><input id="mov-ref" placeholder="Ej: OCP-0001" /></div><div class="form-group"><label>Responsable</label><input id="mov-user" placeholder="Nombre" /></div><div class="form-group" style="grid-column:span 2"><label>Motivo / Notas</label><textarea id="mov-motivo" style="min-height:60px;"></textarea></div></div>`,`<button class="btn btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveMovInv('${invId}',${stockActual})">Registrar</button>`);}
async function saveMovInv(invId,stockActual){const tipo=document.getElementById('mov-tipo').value;const cant=parseFloat(document.getElementById('mov-cant').value)||0;if(cant<=0){toast('Cantidad mayor a 0',false);return;}let stockNuevo=parseFloat(stockActual)||0;if(tipo==='entrada')stockNuevo+=cant;else if(tipo==='salida'){stockNuevo-=cant;if(stockNuevo<0){toast('Stock insuficiente',false);return;}}else stockNuevo=cant;await sb.from('inventario_movimientos').insert({inventario_id:invId,tipo,cantidad:cant,stock_anterior:stockActual,stock_nuevo:stockNuevo,referencia:document.getElementById('mov-ref').value,motivo:document.getElementById('mov-motivo').value,usuario:document.getElementById('mov-user').value});await sb.from('inventario').update({stock_actual:stockNuevo,updated_at:new Date().toISOString()}).eq('id',invId);toast('Movimiento registrado ✓');closeModal();await loadInv();}
async function modalEditInv(id){const{data:d}=await sb.from('inventario').select('*').eq('id',id).single();if(!d)return;openModal('⚙️ Configurar inventario',`<div class="form-grid"><div class="form-group"><label>Stock mínimo (alerta)</label><input type="number" id="inv-min" value="${d.stock_minimo||0}" min="0" step="0.01" /></div><div class="form-group"><label>Stock máximo</label><input type="number" id="inv-max" value="${d.stock_maximo||0}" min="0" step="0.01" /></div><div class="form-group" style="grid-column:span 2"><label>Ubicación en almacén</label><input id="inv-ubic" value="${esc(d.ubicacion||'')}" placeholder="Pasillo A, Estante 3..." /></div></div>`,`<button class="btn btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveEditInv('${id}')">Guardar</button>`);}
async function saveEditInv(id){await sb.from('inventario').update({stock_minimo:parseFloat(document.getElementById('inv-min').value)||0,stock_maximo:parseFloat(document.getElementById('inv-max').value)||0,ubicacion:document.getElementById('inv-ubic').value,updated_at:new Date().toISOString()}).eq('id',id);toast('Actualizado ✓');closeModal();await loadInv();}
async function verHistorialInv(id,nombre){const{data:movs}=await sb.from('inventario_movimientos').select('*').eq('inventario_id',id).order('created_at',{ascending:false}).limit(30);const rows=(movs||[]).map(m=>`<tr><td>${fmtDate(m.created_at?.split('T')[0])}</td><td>${m.tipo==='entrada'?'<span class="badge badge-green">Entrada</span>':m.tipo==='salida'?'<span class="badge badge-red">Salida</span>':'<span class="badge badge-blue">Ajuste</span>'}</td><td>${m.cantidad}</td><td>${m.stock_anterior??'—'} → ${m.stock_nuevo??'—'}</td><td>${m.referencia||'—'}</td><td>${m.motivo||'—'}</td><td>${m.usuario||'—'}</td></tr>`).join('');openModal('📋 Historial — '+nombre,`${rows?`<table class="data"><thead><tr><th>Fecha</th><th>Tipo</th><th>Cant.</th><th>Stock</th><th>Ref.</th><th>Motivo</th><th>Responsable</th></tr></thead><tbody>${rows}</tbody></table>`:`<div class="empty"><div>Sin movimientos</div></div>`}`,`<button class="btn btn-secondary" onclick="closeModal()">Cerrar</button>`);}

let _cont=[];
pages.contabilidad=async function(){const c=document.getElementById('content');c.innerHTML=`<div id="cont-stats" style="margin-bottom:20px;"></div><div class="search-bar"><select id="cont-tipo" onchange="filterCont()" style="padding:8px;border:1px solid var(--border);border-radius:var(--radius);"><option value="">Todos</option><option value="ingreso">Ingresos</option><option value="egreso">Egresos</option></select><select id="cont-cat" onchange="filterCont()" style="padding:8px;border:1px solid var(--border);border-radius:var(--radius);"><option value="">Todas las categorías</option><option>Ventas</option><option>Servicios</option><option>Sueldos</option><option>Renta</option><option>Proveedores</option><option>Impuestos</option><option>Otros</option></select><button class="btn btn-primary" onclick="modalMovimiento()">+ Nuevo movimiento</button></div><div class="panel"><div class="panel-body tbl-wrap"><div id="cont-table">Cargando...</div></div></div>`;await loadCont();};
async function loadCont(){const{data}=await sb.from('contabilidad').select('*').order('fecha',{ascending:false});_cont=data||[];renderContStats();renderCont(_cont);}
function renderContStats(){const ing=_cont.filter(x=>x.tipo==='ingreso').reduce((s,x)=>s+(parseFloat(x.monto)||0),0);const egr=_cont.filter(x=>x.tipo==='egreso').reduce((s,x)=>s+(parseFloat(x.monto)||0),0);const cxc=_cont.filter(x=>x.estatus==='pendiente de pago').reduce((s,x)=>s+(parseFloat(x.monto)||0),0);const el=document.getElementById('cont-stats');if(!el)return;el.innerHTML=`<div class="stat-grid" style="grid-template-columns:repeat(4,1fr);"><div class="stat-card"><div class="label">Ingresos</div><div class="value" style="color:var(--success)">${fmt(ing)}</div></div><div class="stat-card"><div class="label">Egresos</div><div class="value" style="color:var(--danger)">${fmt(egr)}</div></div><div class="stat-card"><div class="label">Balance</div><div class="value" style="color:${ing-egr>=0?'var(--success)':'var(--danger)'}">${fmt(ing-egr)}</div></div><div class="stat-card"><div class="label">Cuentas por cobrar</div><div class="value" style="color:var(--warning)">${fmt(cxc)}</div></div></div>`;}
function filterCont(){const t=document.getElementById('cont-tipo')?.value||'';const cat=document.getElementById('cont-cat')?.value||'';renderCont(_cont.filter(x=>(!t||x.tipo===t)&&(!cat||x.categoria===cat)));}
function renderCont(list){const el=document.getElementById('cont-table');if(!el)return;if(!list.length){el.innerHTML=`<div class="empty"><div class="icon">💰</div><div>Sin movimientos</div></div>`;return;}el.innerHTML=`<table class="data"><thead><tr><th>Fecha</th><th>Tipo</th><th>Categoría</th><th>Descripción</th><th>Cliente</th><th>Monto</th><th>Método</th><th>Estatus</th><th>Acciones</th></tr></thead><tbody>${list.map(r=>`<tr class="${r.tipo==='ingreso'?'ingreso-row':'egreso-row'}"><td>${fmtDate(r.fecha)}</td><td>${r.tipo==='ingreso'?'<span class="badge badge-green">Ingreso</span>':'<span class="badge badge-red">Egreso</span>'}</td><td>${r.categoria||'—'}</td><td>${esc(r.descripcion)}</td><td>${r.cliente_nombre||'—'}</td><td style="font-weight:700;color:${r.tipo==='ingreso'?'var(--success)':'var(--danger)'}">${r.tipo==='ingreso'?'+':'-'}${fmt(r.monto)}</td><td>${r.metodo_pago||'—'}</td><td>${badgeEstatus(r.estatus)}</td><td><button class="btn-icon" onclick="modalMovimiento('${r.id}')">✏️</button> <button class="btn-icon" onclick="delMov('${r.id}')">🗑️</button></td></tr>`).join('')}</tbody></table>`;}
async function modalMovimiento(id){let d={tipo:'ingreso',categoria:'Ventas',descripcion:'',monto:0,moneda:'MXN',fecha:new Date().toISOString().split('T')[0],cliente_id:null,cliente_nombre:'',metodo_pago:'Transferencia bancaria',referencia:'',estatus:'confirmado',notas:''};if(id){const{data}=await sb.from('contabilidad').select('*').eq('id',id).single();if(data)d=data;}const{data:clis}=await sb.from('clientes').select('id,nombre').order('nombre');const cOpts='<option value="">— Sin cliente —</option>'+(clis||[]).map(c=>`<option value="${c.id}" data-name="${esc(c.nombre)}" ${d.cliente_id===c.id?'selected':''}>${esc(c.nombre)}</option>`).join('');openModal(id?'Editar movimiento':'Nuevo movimiento',`<div class="form-grid"><div class="form-group"><label>Tipo</label><select id="mf-tipo"><option value="ingreso" ${d.tipo==='ingreso'?'selected':''}>Ingreso</option><option value="egreso" ${d.tipo==='egreso'?'selected':''}>Egreso</option></select></div><div class="form-group"><label>Categoría</label><select id="mf-cat"><option>Ventas</option><option ${d.categoria==='Servicios'?'selected':''}>Servicios</option><option ${d.categoria==='Sueldos'?'selected':''}>Sueldos</option><option ${d.categoria==='Renta'?'selected':''}>Renta</option><option ${d.categoria==='Proveedores'?'selected':''}>Proveedores</option><option ${d.categoria==='Impuestos'?'selected':''}>Impuestos</option><option ${d.categoria==='Otros'?'selected':''}>Otros</option></select></div><div class="form-group" style="grid-column:span 2"><label>Descripción *</label><input id="mf-desc" value="${esc(d.descripcion)}" /></div><div class="form-group"><label>Monto</label><input type="number" id="mf-monto" value="${d.monto||0}" min="0" step="0.01" /></div><div class="form-group"><label>Moneda</label><select id="mf-mon"><option>MXN</option><option ${d.moneda==='USD'?'selected':''}>USD</option></select></div><div class="form-group"><label>Fecha</label><input type="date" id="mf-fecha" value="${d.fecha||''}" /></div><div class="form-group"><label>Cliente</label><select id="mf-cli">${cOpts}</select></div><div class="form-group"><label>Método de pago</label><select id="mf-met"><option>Transferencia bancaria</option><option ${d.metodo_pago==='Efectivo'?'selected':''}>Efectivo</option><option ${d.metodo_pago==='Cheque'?'selected':''}>Cheque</option><option ${d.metodo_pago==='Tarjeta'?'selected':''}>Tarjeta</option><option ${d.metodo_pago==='Depósito'?'selected':''}>Depósito</option></select></div><div class="form-group"><label>Referencia</label><input id="mf-ref" value="${esc(d.referencia||'')}" /></div><div class="form-group"><label>Estatus</label><select id="mf-est"><option value="confirmado" ${d.estatus==='confirmado'?'selected':''}>Confirmado</option><option value="pendiente de pago" ${d.estatus==='pendiente de pago'?'selected':''}>Pendiente de pago</option></select></div><div class="form-group" style="grid-column:span 2"><label>Notas</label><textarea id="mf-notas">${esc(d.notas||'')}</textarea></div></div>`,`<button class="btn btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveMov('${id||''}')">Guardar</button>`);}
async function saveMov(id){const cliSel=document.getElementById('mf-cli');const cliOpt=cliSel?.options[cliSel.selectedIndex];const obj={tipo:document.getElementById('mf-tipo').value,categoria:document.getElementById('mf-cat').value,descripcion:document.getElementById('mf-desc').value,monto:parseFloat(document.getElementById('mf-monto').value)||0,moneda:document.getElementById('mf-mon').value,fecha:document.getElementById('mf-fecha').value||null,cliente_id:cliSel?.value||null,cliente_nombre:cliOpt?.dataset?.name||'',metodo_pago:document.getElementById('mf-met').value,referencia:document.getElementById('mf-ref').value,estatus:document.getElementById('mf-est').value,notas:document.getElementById('mf-notas').value,updated_at:new Date().toISOString()};if(!obj.descripcion){toast('Descripción requerida',false);return;}const{error}=id?await sb.from('contabilidad').update(obj).eq('id',id):await sb.from('contabilidad').insert(obj);if(error){toast('Error: '+error.message,false);return;}toast('Guardado ✓');closeModal();await loadCont();}
async function delMov(id){if(!confirm('¿Eliminar?'))return;await sb.from('contabilidad').delete().eq('id',id);toast('Eliminado');await loadCont();}
pages.vendedores=async function(){if(!_adminAuth){const c=document.getElementById('content');c.innerHTML=`<div style="max-width:400px;margin:60px auto;"><div class="panel"><div class="panel-header"><h3>🔐 Acceso restringido</h3></div><div class="panel-body"><p style="font-size:13px;color:var(--muted);margin-bottom:20px;">Requiere contraseña de administrador.</p><div class="form-group" style="margin-bottom:16px;"><label>Contraseña</label><input type="password" id="admin-pass-vend" onkeydown="if(event.key==='Enter')checkAdminVend()" autofocus /></div><div id="admin-err-vend" style="color:var(--danger);font-size:12px;margin-bottom:12px;display:none;">Contraseña incorrecta</div><button class="btn btn-primary" style="width:100%;" onclick="checkAdminVend()">Entrar</button></div></div></div>`;return;}const c=document.getElementById('content');c.innerHTML=`<div style="margin-bottom:16px;text-align:right;"><button class="btn btn-primary" onclick="modalVendedor()">+ Nuevo vendedor</button></div><div class="panel"><div class="panel-body tbl-wrap"><div id="vend-table">Cargando...</div></div></div>`;await loadVendedores();};
function checkAdminVend(){const v=document.getElementById('admin-pass-vend')?.value;if(v===ADMIN_PASS){_adminAuth=true;pages.vendedores();}else{document.getElementById('admin-err-vend').style.display='block';document.getElementById('admin-pass-vend').value='';}}
async function loadVendedores(){const{data}=await sb.from('vendedores').select('*').order('nombre');const el=document.getElementById('vend-table');if(!el)return;if(!data?.length){el.innerHTML=`<div class="empty"><div class="icon">👤</div><div>Sin vendedores</div></div>`;return;}el.innerHTML=`<table class="data"><thead><tr><th>Nombre</th><th>Email</th><th>Teléfono</th><th>Activo</th><th>Acciones</th></tr></thead><tbody>${data.map(r=>`<tr><td><strong>${esc(r.nombre)}</strong></td><td>${r.email||'—'}</td><td>${r.telefono||'—'}</td><td>${r.activo?'<span class="badge badge-green">Sí</span>':'<span class="badge badge-gray">No</span>'}</td><td><button class="btn-icon" onclick="modalVendedor('${r.id}')">✏️</button> <button class="btn-icon" onclick="delVendedor('${r.id}')">🗑️</button></td></tr>`).join('')}</tbody></table>`;}
async function modalVendedor(id){if(!_adminAuth){toast('Se requiere contraseña',false);return;}let d={nombre:'',email:'',telefono:'',activo:true};if(id){const{data}=await sb.from('vendedores').select('*').eq('id',id).single();if(data)d=data;}openModal(id?'Editar vendedor':'Nuevo vendedor',`<div class="form-grid"><div class="form-group"><label>Nombre *</label><input id="vf-nombre" value="${esc(d.nombre)}" /></div><div class="form-group"><label>Email</label><input id="vf-email" value="${esc(d.email||'')}" /></div><div class="form-group"><label>Teléfono</label><input id="vf-tel" value="${esc(d.telefono||'')}" /></div><div class="form-group"><label>Activo</label><select id="vf-activo"><option value="true" ${d.activo?'selected':''}>Sí</option><option value="false" ${!d.activo?'selected':''}>No</option></select></div></div>`,`<button class="btn btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveVendedor('${id||''}')">Guardar</button>`);}
async function saveVendedor(id){if(!_adminAuth){toast('Se requiere contraseña',false);return;}const obj={nombre:document.getElementById('vf-nombre').value,email:document.getElementById('vf-email').value,telefono:document.getElementById('vf-tel').value,activo:document.getElementById('vf-activo').value==='true'};if(!obj.nombre){toast('Nombre requerido',false);return;}const{error}=id?await sb.from('vendedores').update(obj).eq('id',id):await sb.from('vendedores').insert(obj);if(error){toast('Error: '+error.message,false);return;}toast('Guardado ✓');closeModal();await loadVendedores();}
async function delVendedor(id){if(!_adminAuth){toast('Se requiere contraseña',false);return;}if(!confirm('¿Eliminar?'))return;await sb.from('vendedores').delete().eq('id',id);toast('Eliminado');await loadVendedores();}

pages.configuracion=async function(){if(!_adminAuth){showAdminLogin();return;}await cargarConfigEmpresa();renderConfigPage();};
function showAdminLogin(){const c=document.getElementById('content');c.innerHTML=`<div style="max-width:400px;margin:60px auto;"><div class="panel"><div class="panel-header"><h3>🔐 Acceso de administrador</h3></div><div class="panel-body"><p style="font-size:13px;color:var(--muted);margin-bottom:20px;">Esta sección requiere contraseña de administrador.</p><div class="form-group" style="margin-bottom:16px;"><label>Contraseña</label><input type="password" id="admin-pass-input" onkeydown="if(event.key==='Enter')checkAdminPass()" autofocus /></div><div id="admin-error" style="color:var(--danger);font-size:12px;margin-bottom:12px;display:none;">Contraseña incorrecta</div><button class="btn btn-primary" style="width:100%;" onclick="checkAdminPass()">Entrar</button></div></div></div>`;}
function checkAdminPass(){const v=document.getElementById('admin-pass-input')?.value;if(v===ADMIN_PASS){_adminAuth=true;renderConfigPage();}else{document.getElementById('admin-error').style.display='block';document.getElementById('admin-pass-input').value='';}}
function renderConfigPage(){const c=document.getElementById('content');const emp=_empConfig;c.innerHTML=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;"><div class="panel"><div class="panel-header"><h3>🏢 Datos de la empresa</h3></div><div class="panel-body"><div style="display:flex;align-items:center;gap:16px;margin-bottom:20px;"><div id="cfg-logo-preview" onclick="document.getElementById('cfg-logo-input').click()" style="width:100px;height:75px;border:2px dashed var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;background:#fafafa;flex-shrink:0;">${_logoDataUrl?`<img src="${_logoDataUrl}" style="width:100%;height:100%;object-fit:contain;" />`:'<span style="font-size:12px;color:var(--muted);">+ Logo</span>'}</div><div style="display:flex;flex-direction:column;gap:8px;"><input type="file" id="cfg-logo-input" accept="image/*" style="display:none;" onchange="cfgLoadLogo(event)" /><button class="btn btn-secondary btn-sm" onclick="document.getElementById('cfg-logo-input').click()">📷 Subir logo</button><button class="btn btn-sm" style="background:#fee2e2;color:#991b1b;border:none;border-radius:6px;padding:5px 10px;cursor:pointer;" onclick="cfgRemoveLogo()">✕ Quitar logo</button></div></div><div class="form-grid" style="margin-bottom:12px;"><div class="form-group"><label>Nombre empresa</label><input id="cfg-nombre" value="${esc(emp.nombre||'')}" /></div><div class="form-group"><label>RFC</label><input id="cfg-rfc" value="${esc(emp.rfc||'')}" /></div><div class="form-group"><label>Teléfono</label><input id="cfg-tel" value="${esc(emp.tel||'')}" /></div><div class="form-group"><label>Correo</label><input id="cfg-email" value="${esc(emp.email||'')}" /></div><div class="form-group" style="grid-column:span 2"><label>Dirección</label><input id="cfg-dir" value="${esc(emp.dir||'')}" /></div><div class="form-group"><label>Sitio web</label><input id="cfg-web" value="${esc(emp.web||'')}" /></div><div class="form-group"><label>Slogan</label><input id="cfg-slogan" value="${esc(emp.slogan||'')}" /></div></div><button class="btn btn-primary" style="width:100%;" onclick="cfgSaveEmpresa()">💾 Guardar datos</button></div></div><div style="display:flex;flex-direction:column;gap:20px;"><div class="panel"><div class="panel-header"><h3>🏷️ Categorías de descuento</h3><button class="btn btn-secondary btn-sm" onclick="modalCategoria()">+ Nueva</button></div><div class="panel-body" id="cfg-cats">Cargando...</div></div><div class="panel"><div class="panel-header"><h3>🔐 Seguridad</h3></div><div class="panel-body"><div class="form-group" style="margin-bottom:10px;"><label>Contraseña actual</label><input type="password" id="sec-actual" /></div><div class="form-group" style="margin-bottom:10px;"><label>Nueva contraseña</label><input type="password" id="sec-nueva" /></div><div class="form-group" style="margin-bottom:14px;"><label>Confirmar nueva</label><input type="password" id="sec-confirm" /></div><div id="sec-msg" style="font-size:12px;margin-bottom:10px;display:none;"></div><button class="btn btn-secondary" style="width:100%;margin-bottom:8px;" onclick="cfgChangePass()">Cambiar contraseña</button><button class="btn btn-secondary btn-sm" onclick="cfgCerrarSesion()">🔒 Cerrar sesión admin</button></div></div></div></div>`;loadCfgCats();}
async function loadCfgCats(){const{data}=await sb.from('categorias_descuento').select('*').order('nombre');_categorias=data||[];const el=document.getElementById('cfg-cats');if(!el)return;el.innerHTML=_categorias.length?`<table class="data"><thead><tr><th>Cat.</th><th>Descuento</th><th>Descripción</th><th>Acciones</th></tr></thead><tbody>${_categorias.map(c=>`<tr><td><span class="badge badge-purple">${esc(c.nombre)}</span></td><td><strong>${c.descuento}%</strong></td><td>${esc(c.descripcion||'')}</td><td><button class="btn-icon" onclick="modalCategoria('${c.id}')">✏️</button> <button class="btn-icon" onclick="delCategoria('${c.id}')">🗑️</button></td></tr>`).join('')}</tbody></table>`:`<div class="empty" style="padding:20px;">Sin categorías</div>`;}
async function modalCategoria(id){let d={nombre:'',descuento:0,descripcion:''};if(id){const{data}=await sb.from('categorias_descuento').select('*').eq('id',id).single();if(data)d=data;}openModal(id?'Editar categoría':'Nueva categoría',`<div class="form-grid"><div class="form-group"><label>Nombre (ej: AAA, VIP)</label><input id="catd-nombre" value="${esc(d.nombre)}" placeholder="AAA" /></div><div class="form-group"><label>Descuento %</label><input type="number" id="catd-desc" value="${d.descuento||0}" min="0" max="100" step="0.01" /></div><div class="form-group" style="grid-column:span 2"><label>Descripción</label><input id="catd-descr" value="${esc(d.descripcion||'')}" /></div></div>`,`<button class="btn btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveCategoria('${id||''}')">Guardar</button>`);}
async function saveCategoria(id){const obj={nombre:document.getElementById('catd-nombre').value,descuento:parseFloat(document.getElementById('catd-desc').value)||0,descripcion:document.getElementById('catd-descr').value};if(!obj.nombre){toast('Nombre requerido',false);return;}const{error}=id?await sb.from('categorias_descuento').update(obj).eq('id',id):await sb.from('categorias_descuento').insert(obj);if(error){toast('Error',false);return;}toast('Guardado ✓');closeModal();loadCfgCats();}
async function delCategoria(id){if(!confirm('¿Eliminar?'))return;await sb.from('categorias_descuento').delete().eq('id',id);toast('Eliminada');loadCfgCats();}
function cfgLoadLogo(e){const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=async function(ev){_logoDataUrl=ev.target.result;const{error}=await sb.from('configuracion').update({logo_url:_logoDataUrl,updated_at:new Date().toISOString()}).eq('id','empresa');if(error){toast('Error al guardar logo',false);return;}const prev=document.getElementById('cfg-logo-preview');if(prev)prev.innerHTML=`<img src="${_logoDataUrl}" style="width:100%;height:100%;object-fit:contain;" />`;toast('Logo guardado ✓');};reader.readAsDataURL(file);}
async function cfgRemoveLogo(){_logoDataUrl=null;await sb.from('configuracion').update({logo_url:null,updated_at:new Date().toISOString()}).eq('id','empresa');const prev=document.getElementById('cfg-logo-preview');if(prev)prev.innerHTML='<span style="font-size:12px;color:var(--muted);">+ Logo</span>';toast('Logo eliminado');}
async function cfgSaveEmpresa(){_empConfig={nombre:document.getElementById('cfg-nombre')?.value||'',rfc:document.getElementById('cfg-rfc')?.value||'',tel:document.getElementById('cfg-tel')?.value||'',email:document.getElementById('cfg-email')?.value||'',dir:document.getElementById('cfg-dir')?.value||'',web:document.getElementById('cfg-web')?.value||'',slogan:document.getElementById('cfg-slogan')?.value||''};const{error}=await sb.from('configuracion').update({..._empConfig,updated_at:new Date().toISOString()}).eq('id','empresa');if(error){toast('Error: '+error.message,false);return;}toast('Datos guardados ✓');}
function cfgChangePass(){const actual=document.getElementById('sec-actual')?.value;const nueva=document.getElementById('sec-nueva')?.value;const confirm=document.getElementById('sec-confirm')?.value;const msg=document.getElementById('sec-msg');if(actual!==ADMIN_PASS){msg.style.display='block';msg.style.color='var(--danger)';msg.textContent='Contraseña actual incorrecta.';return;}if(!nueva||nueva.length<6){msg.style.display='block';msg.style.color='var(--danger)';msg.textContent='Mínimo 6 caracteres.';return;}if(nueva!==confirm){msg.style.display='block';msg.style.color='var(--danger)';msg.textContent='No coinciden.';return;}ADMIN_PASS=nueva;msg.style.display='block';msg.style.color='var(--success)';msg.textContent='Contraseña actualizada para esta sesión.';['sec-actual','sec-nueva','sec-confirm'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';}); }
function cfgCerrarSesion(){_adminAuth=false;showPage('dashboard');toast('Sesión cerrada');}

cargarConfigEmpresa().then(()=>pages.dashboard());
</script>
</body>
</html>
